# Minimal Docker dev stack — backend API + optional worker (no bundled DB).
# Usage (repository root):
#   docker compose -f docker-compose.dev.yml build backend
#   docker compose -f docker-compose.dev.yml run --rm backend python tools/hwp_poc/check_hwp_runtime.py --json
#   docker compose -f docker-compose.dev.yml up backend
#
# Requires backend/.env (copy from backend/.env.docker.example; not committed).
# Do not use .env.docker.example alone for health/DB — placeholders fail auth.
# Docker overrides host-only URLs so the same .env can serve native uvicorn (localhost).

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      DB_HOST: host.docker.internal
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  backend-worker:
    profiles:
      - worker
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      DB_HOST: host.docker.internal
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m app.worker_main
