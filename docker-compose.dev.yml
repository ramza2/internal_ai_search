# internal-ai-search — Docker dev stack (compose DB + backend + frontend + optional worker)
#
# Requires backend/.env (copy from backend/.env.example). Run from repo root:
#   docker compose --env-file backend/.env -f docker-compose.dev.yml up -d
#
# Reset DB (deletes named volume data):
#   docker compose --env-file backend/.env -f docker-compose.dev.yml down -v

services:
  db:
    image: pgvector/pgvector:pg18-bookworm
    ports:
      - "${DB_PUBLISH_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: internal_ai_search
      POSTGRES_USER: openlink
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in backend/.env}
    # PG 18+ images expect the mount at /var/lib/postgresql (not .../data)
    volumes:
      - internal_ai_search_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openlink -d internal_ai_search"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  db-migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    command: python scripts/apply_migrations.py
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  backend-worker:
    profiles:
      - worker
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    command: python -m app.worker_main

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      # Vite /api proxy target inside the container (when VITE_API_BASE_URL is empty)
      VITE_DEV_PROXY_TARGET: http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

volumes:
  internal_ai_search_db_data:
